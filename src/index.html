<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>TS GLSL App</title>
    <style>
        #toolbar {
            display: flex;
            flex-direction: row;
        }
    </style>
</head>
<body>
    
    <canvas
        id="glcanvas"
        style="width: 100%; height: 800px; border: 1px solid black"
        width="1536"
        height="1200"
    >

    </canvas>
    <div id="fps-label"></div>
    <div id="toolbar">
        Line width: <input id="line-width" value="1" />
        Line style: <select id="line-style">
            <option value="0" selected>Solid</option>
            <option value="1">Dashed</option>
            <option value="2">Dotted</option>
        </select>
        Color: <input id="line-color" value="#FFFFFFFF" />
    </div>
</body>
</html>
